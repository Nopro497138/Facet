name: Build iOS (unsigned IPA)

# Builds Facet on a free cloud macOS runner and uploads an unsigned .ipa you can
# download. No Mac required on your side. Install it on your iPhone from Windows
# with Sideloadly or AltStore (see BUILD_WITHOUT_MAC.md) — those re-sign the app
# with your own Apple ID, so no paid developer account is needed just to test.

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:        # lets you run it manually from the Actions tab

jobs:
  build:
    runs-on: macos-15       # provides Xcode 16 (needed by this project)
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Show toolchain
        run: xcodebuild -version

      - name: Build (unsigned)
        run: |
          set -euo pipefail
          xcodebuild build \
            -project Facet.xcodeproj \
            -target Facet \
            -configuration Release \
            -sdk iphoneos \
            CONFIGURATION_BUILD_DIR="$PWD/build/out" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package into Facet.ipa
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          cd build/out
          rm -rf Payload
          mkdir Payload
          cp -R Facet.app Payload/
          zip -qr "$GITHUB_WORKSPACE/artifacts/Facet.ipa" Payload

      - name: Upload the IPA
        uses: actions/upload-artifact@v4
        with:
          name: Facet-unsigned-ipa
          path: artifacts/Facet.ipa
          if-no-files-found: error
