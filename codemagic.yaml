# Codemagic build config (alternative to GitHub Actions).
# Sign up at https://codemagic.io (free tier), connect this repo, and run the
# "ios-unsigned" workflow. Download the Facet.ipa artifact when it finishes.
# Install it on your iPhone from Windows with Sideloadly/AltStore — see
# BUILD_WITHOUT_MAC.md.

workflows:
  ios-unsigned:
    name: Facet — unsigned IPA
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      xcode: latest
    scripts:
      - name: Build (unsigned)
        script: |
          set -euo pipefail
          xcodebuild build \
            -project Facet.xcodeproj \
            -target Facet \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
      - name: Package into Facet.ipa
        script: |
          set -euo pipefail
          cd build/Build/Products/Release-iphoneos
          rm -rf Payload && mkdir Payload
          cp -R Facet.app Payload/
          zip -qr "$CM_BUILD_DIR/Facet.ipa" Payload
    artifacts:
      - Facet.ipa
